name: Build

on:
  push:
    tags: ["v*"]

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install system deps
        run: sudo apt-get update && sudo apt-get install -y libxcb1-dev libdbus-1-dev libxdo-dev libx11-dev protobuf-compiler

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build release
        run: cargo build --release --bin aleph

      - name: Create tarball
        run: |
          ARCHIVE="aleph-x86_64-linux"
          mkdir -p "${ARCHIVE}"
          cp target/release/aleph "${ARCHIVE}/"
          tar czf "${ARCHIVE}.tar.gz" "${ARCHIVE}/"

      - uses: actions/upload-artifact@v4
        with:
          name: aleph-x86_64-linux
          path: aleph-x86_64-linux.tar.gz
